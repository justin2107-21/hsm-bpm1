# Netlify Configuration File
[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist"

# Local dev server configuration
[dev]
  command = "npm run dev"
  targetPort = 8080
  port = 8888

# Redirect all API calls to Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

